<!doctype html>
<html lang="en">
  <head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8" />

    <!-- Makes page responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser tab title -->
    <title>Todo Toggle Complete</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Main application container -->
    <div class="container">
      <!-- Page heading -->
      <h1>✅ My Todo List</h1>

      <p class="subtitle">Click a task to mark it complete</p>

      <!-- Input section -->
      <div class="add-section">
        <!-- User enters new task -->
        <input type="text" id="todo-input" placeholder="Enter a task..." />

        <!-- Add button -->
        <button id="add-btn">Add</button>
      </div>

      <!-- Displays todo count -->
      <p id="task-count">Tasks Remaining: 0</p>

      <!-- Todos will appear here -->
      <ul id="todo-list"></ul>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
  </body>
</html>
