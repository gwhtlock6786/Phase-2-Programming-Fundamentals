<!doctype html>
<html lang="en">
  <head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8" />

    <!-- Makes page responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser tab title -->
    <title>Todo Filter App</title>

    <!-- Connect CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <!-- Page title -->
      <h1>✅ Todo List</h1>

      <p class="subtitle">Filter your tasks by status</p>

      <!-- Input section -->
      <div class="add-section">
        <!-- New todo input -->
        <input type="text" id="todo-input" placeholder="Enter a task..." />

        <!-- Add button -->
        <button id="add-btn">Add</button>
      </div>

      <!-- ==================================================
    
    NEW CHANGE FROM ACTIVITY 1:

    Added filter buttons.

    These buttons change the currentFilter value.

    ================================================== -->

      <div class="filter-buttons">
        <!-- Shows every todo -->
        <button id="all-btn">All</button>

        <!-- Shows incomplete todos -->
        <button id="active-btn">Active</button>

        <!-- Shows completed todos -->
        <button id="completed-btn">Completed</button>
      </div>

      <!-- Remaining task count -->
      <p id="task-count">Tasks Remaining: 0</p>

      <!-- Todos appear here -->
      <ul id="todo-list"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
