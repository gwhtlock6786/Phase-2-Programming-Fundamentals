<!doctype html>
<html lang="en">
  <head>
    <!-- Defines character encoding -->
    <meta charset="UTF-8" />

    <!-- Makes the page responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser tab title -->
    <title>Form Validation Practice</title>

    <!-- Connect CSS file -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Main page container -->
    <div class="container">
      <!-- Page heading -->
      <h1>Customer Feedback Form</h1>

      <!-- Description -->
      <p class="subtitle">Practice form validation with JavaScript</p>

      <!-- 
            FORM ELEMENT

            JavaScript will listen for the submit event
            and validate the information before allowing
            submission.
        -->
      <form id="feedback-form">
        <!-- Name field -->
        <div class="form-group">
          <label for="name"> Name: </label>

          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your name"
          />
        </div>

        <!-- Email field -->
        <div class="form-group">
          <label for="email"> Email: </label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
          />
        </div>

        <!-- Visit date field -->
        <div class="form-group">
          <label for="visit-date"> Visit Date: </label>

          <input type="date" id="visit-date" name="visit-date" />
        </div>

        <!-- Feedback field -->
        <div class="form-group">
          <label for="feedback"> Feedback: </label>

          <textarea
            id="feedback"
            name="feedback"
            rows="5"
            placeholder="Enter feedback..."
          ></textarea>
        </div>

        <!-- Submit button -->
        <button type="submit">Submit Feedback</button>
      </form>
    </div>

    <!-- JavaScript file -->
    <script src="./form-practice.js"></script>
  </body>
</html>
