<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant DOM Practice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🍔 JavaScript Restaurant</h1>

      <!-- ==========================
             Task 1
             Today's Special
        =========================== -->

      <section class="card">
        <h2>Today's Special</h2>

        <button id="specialBtn">Show Today's Special</button>

        <p id="specialText">Click the button to see today's special!</p>
      </section>

      <!-- ==========================
             Task 2
             Shopping Cart Counter
        =========================== -->

      <section class="card">
        <h2>Shopping Cart</h2>

        <button id="addItemBtn">Add Item</button>

        <p>
          Items in Cart:
          <span id="cartCount">0</span>
        </p>
      </section>

      <!-- ==========================
             Task 3
             Welcome Message
        =========================== -->

      <section class="card">
        <h2>Customer Greeting</h2>

        <input type="text" id="nameInput" placeholder="Enter your name" />

        <h3 id="welcomeMessage">Welcome!</h3>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
