<!doctype html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />

    <!-- Makes the page responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title -->
    <title>Restaurant Menu</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Main page heading -->
    <h1 id="restaurant-name">Joe's Diner</h1>

    <!-- Restaurant tagline -->
    <p class="tagline">Fresh food made daily!</p>

    <!-- Menu heading -->
    <h2>Menu</h2>

    <!-- Menu list -->
    <ul>
      <li class="menu-item">Cheeseburger</li>
      <li class="menu-item">Chicken Sandwich</li>
      <li class="menu-item">French Fries</li>
      <li class="menu-item">Garden Salad</li>
      <li class="menu-item">Chocolate Milkshake</li>

    <!-- Connect the JavaScript file -->
    <script src="script.js"></script>

</html>
